<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songkran Ultimate Battle 💦</title>
    <link rel="stylesheet" href="songkran.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="selection-screen">
        <div class="selection-content">
            <button id="btn-leaderboard" class="leaderboard-btn-fixed">🏆 อันดับ</button>
            <header class="selection-header">
                <h1>Songkran Battle 5/1 💦</h1>
                <p>เลือกคนที่อยากเล่นสงกรานต์ด้วยยย!</p>
                <div class="selection-stats">เลือกแล้ว: <span id="selected-count">0</span> คน</div>
            </header>
            
            <div class="selection-tools">
                <input type="text" id="search-input" placeholder="🔍 ค้นหาชื่อหรือชื่อเล่น...">
                <div class="action-buttons">
                    <button id="btn-select-all" class="tool-btn">เลือกทั้งหมด</button>
                    <button id="btn-random" class="tool-btn">สุ่มให้หน่อย</button>
                    <button id="btn-clear" class="tool-btn danger">ล้างทั้งหมด</button>
                </div>
            </div>

            <div id="student-grid"></div>
            
            <footer class="selection-footer">
                <button id="start-game-btn" disabled>เริ่มเล่นน้ำเลย! 🔫</button>
            </footer>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>🏆 อันดับคนที่โดนเยอะที่สุด</h2>
            <div id="leaderboard-list">กำลังโหลดข้อมูล...</div>
            <button onclick="closeLeaderboardModal()" class="tool-btn">ปิด</button>
        </div>
    </div>

    <div id="game-container">
        <div class="vignette"></div>
        <div id="ui">
            <div class="weapon-selection-ingame">
                <div class="weapon-grid">
                    <button class="weapon-btn selected" data-weapon="gun">🔫 ปืน</button>
                    <button class="weapon-btn" data-weapon="powder">⚪ แป้ง</button>
                    <button class="weapon-btn" data-weapon="bowl">🥣 ขัน</button>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>

        <div id="instruction-overlay">
            <p>WASD หรือ ปุ่มเคลื่อนที่เพื่อเดิน | Mouse หรือ Touch เพื่อฉีดน้ำ</p>
        </div>

        <div id="mobile-controls">
            <div class="move-btns">
                <button id="btn-left" class="ctrl-btn">◀</button>
                <button id="btn-right" class="ctrl-btn">▶</button>
            </div>
            <button id="btn-jump" class="ctrl-btn jump-btn">JUMP ⬆</button>
        </div>

    </div>
    <script src="songkran.js"></script>
</body>
</html>
