<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>ฝากบอกลูกครูกฤต │ Single Dad</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <script
            src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

        <script
            src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        <script
            src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

        <link rel="stylesheet" href="fakbok.css">
    </head>
    <body>

        <button class="back-btn"
            onclick="window.location.href='index.html'"></button>

        <div class="background-overlay"></div>

        <div class="container">
            <header>
                <h1><i class="fa-solid fa-paper-plane"></i> ฝากบอก 5/1</h1>
                <p class="subtitle">ฝากบอกลูกครูกฤต │ Single Dad</p>
            </header>

            <div id="sendPage" class="page active">
                <div class="select-wrapper">
                    <label for="recipientSelect">
                        <i class="fa-solid fa-user-tag"></i> ส่งถึงใคร:
                    </label>
                    <select id="recipientSelect">
                        <option value="ทุกคนในห้อง">📢 ทุกคนในห้อง</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <textarea id="messageInput"
                        placeholder="พิมพ์ข้อความ..."></textarea>
                    <div class="char-count"><span id="count">0</span>/200</div>
                </div>

                <button class="btn-send" onclick="sendMessage()">
                    <span>ส่งข้อความ</span> <i class="fa-solid fa-rocket"></i>
                </button>

                <button class="btn-link" onclick="showPage('viewPage')">
                    ดูข้อความทั้งหมด <i class="fa-solid fa-chevron-right"></i>
                </button>
                <div id="status"></div>
            </div>

            <div id="viewPage" class="page">
                <div class="view-header">
                    <button class="btn-back" onclick="showPage('sendPage')">
                        <i class="fa-solid fa-arrow-left"></i> กลับ
                    </button>
                </div>

                <div class="filter-container">
                    <p class="filter-label">เลือกดูตามเพื่อน:</p>
                    <div class="filter-chips" id="filterChips">
                        <button class="chip active"
                            onclick="filterBy('all', this)">
                            <div class="chip-icon">🌈</div>
                            <span>ทั้งหมด</span>
                        </button>
                        <button class="chip"
                            onclick="filterBy('ทุกคนในห้อง', this)">
                            <div class="chip-icon">📢</div>
                            <span>ทั้งห้อง</span>
                        </button>
                    </div>
                </div>

                <div class="message-list" id="messageList">
                    <div class="loading"
                        style="text-align: center; padding: 20px; color: #9ca3af;">
                        <i class="fas fa-spinner fa-spin"></i> กำลังดึงข้อมูล...
                    </div>
                </div>
            </div>
        </div>
        <div id="msgModal" class="modal-overlay" onclick="closeModal(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div id="captureArea" class="story-card">
                    <div class="story-inner">
                        <div class="profile-frame">
                            <img id="modalImg" src alt="Profile">
                        </div>
                        <h2 id="modalTo"></h2>
                        <p id="modalTime"></p>
                        <div class="message-quote">
                            <i class="fa-solid fa-quote-left"></i>
                            <p id="modalText"></p>
                            <i class="fa-solid fa-quote-right"></i>
                        </div>
                        <div class="story-footer">
                            <span>ฝากบอกลูกครูกฤต │ Single Dad</span>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-cancel"
                        onclick="closeModal(event)">ปิด</button>
                    <button class="btn-share-story" onclick="processShare()">
                        <i class="fa-solid fa-share-nodes"></i> บันทึกรูปภาพ
                    </button>
                </div>
            </div>
        </div>
        <script src="fakbok.js"></script>
    </body>
</html>
